<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА.ru v2.8.7</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* ВОЗВРАТ К КЛАССИЧЕСКОМУ СТИЛЮ */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #ECE9D8; font-family: Tahoma, sans-serif; font-size: 12px; }
        body { display: flex; flex-direction: column; }
        h1 { color: #2D5082; font-size: 18px; margin: 5px; text-shadow: 1px 1px #fff; text-align: center; flex-shrink: 0; }
        
        #auth-box { flex: 1; display: flex; justify-content: center; align-items: center; background: #ECE9D8; }
        #main-ui { display: none; flex: 1; width: 100%; max-width: 1400px; margin: 0 auto; padding: 10px; box-sizing: border-box; gap: 10px; overflow: hidden; }
        
        .column { display: flex; flex-direction: column; background: #F0F0F0; border: 1px solid #D4D0C8; padding: 8px; height: 100%; box-sizing: border-box; }
        #col-left { width: 180px; flex-shrink: 0; }
        #col-main { flex: 1; background: white; border: 1px solid #7EA4D0; min-width: 400px; }
        #col-right { width: 250px; flex-shrink: 0; }

        .card { border: 1px solid #7EA4D0; background: #fff; padding: 8px; margin-bottom: 8px; flex-shrink: 0; }
        button { background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%); border: 1px solid #707070; border-radius: 2px; padding: 4px; cursor: pointer; font-weight: bold; font-size: 11px; color: #000; }
        input, textarea { border: 1px solid #7EA4D0; padding: 5px; margin: 3px 0; width: 100%; box-sizing: border-box; font-family: Tahoma; }
        
        .scroll-area { flex: 1; overflow-y: auto; background: white; border: 1px solid #7EA4D0; padding: 5px; }
        .post { border-bottom: 1px solid #eee; padding: 8px 0; font-size: 11px; }
        .embedded-img { max-width: 100%; max-height: 250px; display: block; margin-top: 5px; border: 1px solid #D4D0C8; }
        
        /* Лайки через колонку */
        .like-row { margin-top: 5px; display: flex; align-items: center; gap: 6px; }
        .like-btn { color: #2D5082; background: #F0F0F0; border: 1px solid #D4D0C8; padding: 2px 8px; font-size: 10px; cursor: pointer; }
        .like-btn.active { background: #2D5082; color: white; border-color: #2D5082; }

        #chat-header { background: #7EA4D0; color: white; padding: 6px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        @media (max-width: 768px) {
            #main-ui { flex-direction: column; padding: 0; gap: 0; }
            .column { width: 100% !important; min-width: 0 !important; display: none; border: none; }
            .mobile-nav { display: flex; }
            .column.active-mob { display: flex; }
        }

        .mobile-nav { display: none; background: #D4D0C8; border-top: 1px solid #808080; flex-shrink: 0; height: 45px; justify-content: space-around; align-items: center; }
        .mobile-nav button { flex: 1; height: 100%; border: none; border-right: 1px solid #808080; background: transparent; color: #2D5082; }

        #notification-container { position: fixed; top: 10px; right: 10px; z-index: 9999; pointer-events: none; }
        .toast { background: #2D5082; color: white; padding: 10px; border: 2px solid #fff; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); margin-bottom: 5px; font-size: 11px; pointer-events: auto; cursor: pointer; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <h1>ЛАСТОЧКА.ru v2.8.7</h1>

    <div id="auth-box">
        <div class="card" style="width:280px;">
            <strong>ВХОД</strong>
            <input type="number" id="my-id-input" placeholder="ID">
            <input type="password" id="my-pass-input" placeholder="Пароль">
            <button onclick="handleAuth()" style="width:100%; margin-top:5px;">ВОЙТИ</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="column" id="col-left">
            <div class="card" style="text-align:center;">
                <img id="my-avatar-img" src="" style="width:50px; height:50px; border-radius:50%; border:1px solid #7EA4D0;">
                <div id="display-nick" style="font-weight:bold; color:#2D5082;"></div>
            </div>
            <strong>ГРУППЫ:</strong>
            <div id="groups-list" class="scroll-area"></div>
        </div>

        <div class="column active-mob" id="col-main">
            <div id="profile-screen" style="display:flex; flex-direction:column; height:100%;">
                <div class="card" style="display:flex; align-items:center; gap:10px;">
                    <img id="view-avatar" style="width:60px; height:60px; border-radius:50%; object-fit:cover;">
                    <div>
                        <b id="view-nick"></b><br>
                        <small id="view-id-label"></small>
                    </div>
                </div>
                <div id="inbox-area" class="card" style="display:none; background: #eef;">
                    <strong>Входящие:</strong>
                    <div id="inbox-list"></div>
                </div>
                <div id="wall-input-area" class="card">
                    <textarea id="post-text" placeholder="Что нового?"></textarea>
                    <button onclick="createPost()" style="width:100%;">ОПУБЛИКОВАТЬ</button>
                </div>
                <div id="wall-posts" class="scroll-area"></div>
            </div>

            <div id="chat-window" style="display:none; flex-direction:column; height:100%;">
                <div id="chat-header">
                    <button onclick="switchTab('col-left')">Назад</button>
                    <span id="chat-title">Чат</span>
                    <span></span>
                </div>
                <div id="messages-list" class="scroll-area"></div>
                <div class="card" style="display:flex; gap:5px;">
                    <input type="text" id="msg-input" placeholder="Сообщение...">
                    <button onclick="sendMessage()">ОТПР.</button>
                </div>
            </div>
        </div>

        <div class="column" id="col-right">
            <strong>ПОИСК ПО ID:</strong>
            <input type="number" id="target-id-input">
            <button onclick="goToId()" style="width:100%;">GO</button>
            <br>
            <strong>ЛЮДИ:</strong>
            <div id="users-list" class="scroll-area"></div>
        </div>
    </div>

    <div class="mobile-nav">
        <button onclick="switchTab('col-left')">ЧАТЫ</button>
        <button onclick="switchTab('col-main'); showWall();">СТЕНА</button>
        <button onclick="switchTab('col-right')">ЛЮДИ</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, currentChatId;

        async function handleAuth() {
            const id = document.getElementById('my-id-input').value;
            const pass = document.getElementById('my-pass-input').value;
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).eq('password', pass).single();
            if (user) {
                myId = id;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                document.getElementById('display-nick').innerText = user.nickname;
                document.getElementById('my-avatar-img').src = user.avatar_url;
                viewProfile(myId); loadGroups(); loadUsers();
            } else alert("Ошибка!");
        }

        async function toggleLike(postId) {
            const { data: post } = await _supabase.from('posts').select('likes, liked_by, author_id').eq('id', postId).single();
            let likedBy = post.liked_by || [];
            let count = post.likes || 0;
            const uid = String(myId);

            if(likedBy.includes(uid)) {
                likedBy = likedBy.filter(i => i !== uid);
                count = Math.max(0, count - 1);
            } else {
                likedBy.push(uid);
                count++;
            }
            await _supabase.from('posts').update({ likes: count, liked_by: likedBy }).eq('id', postId);
            loadPosts(post.author_id);
        }

        async function viewProfile(userId) {
            switchTab('col-main');
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', userId).single();
            if(!user) return;
            document.getElementById('view-avatar').src = user.avatar_url;
            document.getElementById('view-nick').innerText = user.nickname;
            document.getElementById('view-id-label').innerText = "ID: " + user.id_number;
            document.getElementById('wall-input-area').style.display = (userId == myId) ? 'block' : 'none';
            loadPosts(userId);
        }

        async function loadPosts(userId) {
            const { data: posts } = await _supabase.from('posts').select('*').eq('author_id', userId).order('created_at', { ascending: false });
            const wall = document.getElementById('wall-posts');
            wall.innerHTML = (posts || []).map(p => `
                <div class="post">
                    <small>${new Date(p.created_at).toLocaleDateString()}</small>
                    <div>${p.text}</div>
                    <div class="like-row">
                        <button class="like-btn ${(p.liked_by||[]).includes(String(myId))?'active':''}" onclick="toggleLike('${p.id}')">ЛАЙК</button>
                        <b style="color:#2D5082;">${p.likes || 0}</b>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(id) {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('active-mob'));
            document.getElementById(id).classList.add('active-mob');
        }

        async function loadGroups() {
            const { data } = await _supabase.from('groups').select('*');
            document.getElementById('groups-list').innerHTML = (data || []).map(g => `<div class="card" style="cursor:pointer;" onclick="startGroup('${g.id}','${g.name}')">${g.name}</div>`).join('');
        }

        async function createPost() {
            const t = document.getElementById('post-text').value;
            if(!t) return;
            await _supabase.from('posts').insert([{ author_id: myId, text: t, likes: 0, liked_by: [] }]);
            document.getElementById('post-text').value = "";
            viewProfile(myId);
        }

        function showWall() { viewProfile(myId); }
        function goToId() { const i = document.getElementById('target-id-input').value; viewProfile(i); }
        async function loadUsers() {
            const { data } = await _supabase.from('users').select('*');
            document.getElementById('users-list').innerHTML = (data || []).map(u => `<div onclick="viewProfile('${u.id_number}')" style="cursor:pointer; padding:2px;">${u.nickname}</div>`).join('');
        }
    </script>
</body>
</html>
