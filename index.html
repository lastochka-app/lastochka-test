<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА.ru v2.8.9</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #ECE9D8; font-family: Tahoma, sans-serif; font-size: 11px; }
        body { display: flex; flex-direction: column; }
        h1 { color: #2D5082; font-size: 16px; margin: 5px; text-shadow: 1px 1px #fff; text-align: center; }
        
        #auth-box { flex: 1; display: flex; justify-content: center; align-items: center; }
        #main-ui { display: none; flex: 1; width: 100%; max-width: 1400px; margin: 0 auto; padding: 5px; box-sizing: border-box; gap: 8px; overflow: hidden; }
        
        .column { display: flex; flex-direction: column; background: #F0F0F0; border: 1px solid #D4D0C8; padding: 5px; height: 100%; box-sizing: border-box; }
        #col-left { width: 180px; flex-shrink: 0; }
        #col-main { flex: 1; background: white; border: 1px solid #7EA4D0; min-width: 350px; }
        #col-right { width: 220px; flex-shrink: 0; }

        .card { border: 1px solid #7EA4D0; background: #fff; padding: 8px; margin-bottom: 5px; }
        button { background: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%); border: 1px solid #707070; padding: 3px 6px; cursor: pointer; font-family: Tahoma; font-size: 11px; }
        button:active { background: #D4D0C8; }
        input, textarea { border: 1px solid #7EA4D0; padding: 4px; margin: 2px 0; width: 100%; box-sizing: border-box; font-family: Tahoma; font-size: 11px; }
        
        .scroll-area { flex: 1; overflow-y: auto; background: white; border: 1px solid #7EA4D0; padding: 5px; }
        
        /* Посты */
        .post { border-bottom: 2px solid #ECE9D8; padding: 10px 0; }
        .post-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .del-btn { color: #cc0000; border: none; background: none; cursor: pointer; font-size: 10px; font-weight: bold; }
        
        /* Комментарии */
        .comments-section { background: #F9F9F9; margin-top: 8px; padding: 5px; border: 1px solid #E0E0E0; }
        .comment { border-bottom: 1px dashed #CCC; padding: 4px 0; font-size: 10px; }
        .quote-box { background: #EEE; border-left: 3px solid #7EA4D0; padding: 3px; margin: 3px 0; font-style: italic; color: #555; }
        
        /* Аватарки */
        #my-avatar-img { width: 80px; height: 105px; border: 1px solid #7EA4D0; object-fit: cover; display: block; margin: 0 auto; }
        #view-avatar { width: 90px; height: 120px; border: 1px solid #7EA4D0; object-fit: cover; }
        .user-item-img { width: 20px; height: 26px; object-fit: cover; border: 1px solid #CCC; vertical-align: middle; margin-right: 5px; }

        .like-row { margin-top: 5px; display: flex; gap: 10px; align-items: center; }
        .active-like { background: #2D5082 !important; color: white !important; }

        @media (max-width: 768px) {
            .column { display: none; width: 100% !important; }
            .column.active-mob { display: flex; }
            #main-ui { padding: 0; }
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <h1>ЛАСТОЧКА.ru v2.8.9</h1>

    <div id="auth-box">
        <div class="card" style="width:260px;">
            <center><b>ВХОД</b></center>
            <input type="number" id="my-id-input" placeholder="ID">
            <input type="text" id="my-nick-input" placeholder="Никнейм">
            <input type="password" id="my-pass-input" placeholder="Пароль">
            <input type="text" id="my-avatar-input" placeholder="URL портрета">
            <button onclick="handleAuth('login')" style="width:100%; margin-top:5px;">ВОЙТИ</button>
            <button onclick="handleAuth('reg')" style="width:100%; margin-top:3px;">РЕГИСТРАЦИЯ</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="column" id="col-left">
            <div class="card" style="text-align:center;">
                <img id="my-avatar-img" src="">
                <div id="display-nick" style="font-weight:bold; color:#2D5082; margin-top:5px;"></div>
            </div>
            <strong>ГРУППЫ:</strong>
            <div id="groups-list" class="scroll-area"></div>
        </div>

        <div class="column active-mob" id="col-main">
            <div id="profile-screen" style="display:flex; flex-direction:column; height:100%;">
                <div class="card" style="display:flex; gap:10px;">
                    <img id="view-avatar" src="">
                    <div style="flex:1;">
                        <b id="view-nick" style="font-size:14px; color:#2D5082;"></b><br>
                        <small id="view-id-label"></small><br>
                        <button id="write-btn" style="display:none; margin-top:5px;">НАПИСАТЬ</button>
                    </div>
                </div>

                <div id="wall-input-area" class="card">
                    <textarea id="post-text" placeholder="Что нового?" rows="2"></textarea>
                    <button onclick="createPost()" style="width:100%;">ОПУБЛИКОВАТЬ</button>
                </div>
                <div id="wall-posts" class="scroll-area"></div>
            </div>

            <div id="chat-window" style="display:none; flex-direction:column; height:100%;">
                <div id="chat-header" style="background:#7EA4D0; color:white; padding:5px; display:flex; justify-content:space-between;">
                    <button onclick="switchTab('col-left')">НАЗАД</button>
                    <span id="chat-title">ЧАТ</span>
                    <span></span>
                </div>
                <div id="messages-list" class="scroll-area"></div>
                <div class="card" style="display:flex; gap:5px;">
                    <input type="text" id="msg-input" placeholder="Сообщение...">
                    <button onclick="sendMessage()">ОТПР.</button>
                </div>
            </div>
        </div>

        <div class="column" id="col-right">
            <strong>ПОЛЬЗОВАТЕЛИ:</strong>
            <div id="users-list" class="scroll-area"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, myNick;

        // --- АВТОРИЗАЦИЯ ---
        async function handleAuth(mode) {
            const id = document.getElementById('my-id-input').value;
            const pass = document.getElementById('my-pass-input').value;
            const nick = document.getElementById('my-nick-input').value;
            let av = document.getElementById('my-avatar-input').value.trim() || "https://via.placeholder.com/80x105";

            if (mode === 'reg') await _supabase.from('users').insert([{ id_number: id, password: pass, nickname: nick, avatar_url: av }]);
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).eq('password', pass).single();
            
            if (user) {
                myId = id; myNick = user.nickname;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                document.getElementById('display-nick').innerText = myNick;
                document.getElementById('my-avatar-img').src = user.avatar_url;
                loadUsers(); loadGroups(); viewProfile(myId);
            } else alert("Ошибка!");
        }

        // --- ПОСТЫ И КОММЕНТЫ ---
        async function createPost() {
            const txt = document.getElementById('post-text').value;
            if(!txt) return;
            await _supabase.from('posts').insert([{ author_id: myId, text: txt, likes: 0, liked_by: [] }]);
            document.getElementById('post-text').value = "";
            viewProfile(myId);
        }

        async function deletePost(postId) {
            if(!confirm("Удалить пост?")) return;
            await _supabase.from('posts').delete().eq('id', postId).eq('author_id', myId);
            viewProfile(myId);
        }

        async function toggleLike(postId) {
            const { data: post } = await _supabase.from('posts').select('*').eq('id', postId).single();
            let likedBy = post.liked_by || [];
            let count = post.likes || 0;
            if(likedBy.includes(String(myId))) {
                likedBy = likedBy.filter(i => i !== String(myId));
                count--;
            } else {
                likedBy.push(String(myId));
                count++;
            }
            await _supabase.from('posts').update({ likes: count, liked_by: likedBy }).eq('id', postId);
            loadPosts(post.author_id);
        }

        async function addComment(postId, authorId, replyToText = null) {
            const txt = prompt(replyToText ? `Цитирование: "${replyToText}"\nВаш ответ:` : "Ваш комментарий:");
            if(!txt) return;
            const finalTxt = replyToText ? `[quote]${replyToText}[/quote] ${txt}` : txt;
            await _supabase.from('comments').insert([{ post_id: postId, author_id: myId, author_nick: myNick, text: finalTxt }]);
            loadPosts(authorId);
        }

        async function loadPosts(userId) {
            const { data: posts } = await _supabase.from('posts').select('*').eq('author_id', userId).order('created_at', { ascending: false });
            const wall = document.getElementById('wall-posts');
            wall.innerHTML = '';

            for(let p of (posts || [])) {
                const { data: comms } = await _supabase.from('comments').select('*').eq('post_id', p.id).order('created_at', { ascending: true });
                const isMyPost = p.author_id == myId;
                
                const postDiv = document.createElement('div');
                postDiv.className = 'post';
                postDiv.innerHTML = `
                    <div class="post-header">
                        <small style="color:#666;">${new Date(p.created_at).toLocaleString()}</small>
                        ${isMyPost ? `<button class="del-btn" onclick="deletePost('${p.id}')">УДАЛИТЬ</button>` : ''}
                    </div>
                    <div style="margin:5px 0; font-size:12px;">${p.text}</div>
                    <div class="like-row">
                        <button onclick="toggleLike('${p.id}')" class="${(p.liked_by||[]).includes(String(myId))?'active-like':''}">Нравиться (${p.likes || 0})</button>
                        <button onclick="addComment('${p.id}', '${userId}')">Комментировать</button>
                    </div>
                    <div class="comments-section" id="comms-${p.id}">
                        ${(comms || []).map(c => {
                            let cleanText = c.text.replace(/\[quote\](.*?)\[\/quote\]/g, '<div class="quote-box">$1</div>');
                            return `
                            <div class="comment">
                                <b>${c.author_nick}:</b> <span>${cleanText}</span>
                                <a href="#" onclick="addComment('${p.id}', '${userId}', '${c.text.replace(/'/g, "")}')" style="color:#2D5082; font-size:9px; margin-left:5px;">[Цит.]</a>
                            </div>`;
                        }).join('')}
                    </div>
                `;
                wall.appendChild(postDiv);
            }
        }

        // --- ОСТАЛЬНОЙ ФУНКЦИОНАЛ ---
        async function viewProfile(id) {
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).single();
            if(!user) return;
            document.getElementById('view-avatar').src = user.avatar_url;
            document.getElementById('view-nick').innerText = user.nickname;
            document.getElementById('view-id-label').innerText = "ID: " + user.id_number;
            document.getElementById('wall-input-area').style.display = (id == myId) ? 'block' : 'none';
            loadPosts(id);
        }

        async function loadUsers() {
            const { data } = await _supabase.from('users').select('*');
            document.getElementById('users-list').innerHTML = (data || []).map(u => `
                <div style="cursor:pointer; padding:3px; border-bottom:1px solid #EEE;" onclick="viewProfile('${u.id_number}')">
                    <img src="${u.avatar_url}" class="user-item-img"> ${u.nickname}
                </div>
            `).join('');
        }

        function switchTab(id) {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('active-mob'));
            document.getElementById(id).classList.add('active-mob');
        }

        async function loadGroups() {
            const { data } = await _supabase.from('groups').select('*');
            document.getElementById('groups-list').innerHTML = (data || []).map(g => `<div class="card" style="font-size:10px;"># ${g.name}</div>`).join('');
        }
    </script>
</body>
</html>
