<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА.ru — Premium Edition</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap');

        :root {
            --bg-main: #E5E5E5;
            --bg-col: rgba(242, 242, 242, 0.8);
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-main: #222222;
            --text-sub: #666666;
            --holo-blue: #33B5E5;
            --holo-blue-glow: rgba(51, 181, 229, 0.4);
            --border-ui: rgba(204, 204, 204, 0.5);
            --border-accent: #999999;
            --btn-hover: rgba(51, 181, 229, 0.1);
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-main: #0a0a0a;
            --bg-col: rgba(20, 20, 20, 0.8);
            --bg-card: rgba(30, 30, 30, 0.9);
            --text-main: #eeeeee;
            --text-sub: #888888;
            --border-ui: rgba(51, 51, 51, 0.5);
            --border-accent: #444444;
        }

        /* Плавное появление контента */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--bg-main); 
            font-family: 'Roboto', sans-serif; 
            color: var(--text-main);
            transition: background 0.5s ease;
        }
        
        body { display: flex; flex-direction: column; }
        
        h1 { 
            color: var(--holo-blue); 
            font-size: 22px; 
            font-weight: 100; 
            margin: 0; 
            padding: 15px; 
            text-align: center; 
            background: var(--bg-card);
            border-bottom: 2px solid var(--holo-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            backdrop-filter: blur(10px);
            z-index: 100;
            box-shadow: var(--shadow);
        }
        
        #main-ui { 
            display: none; 
            flex: 1; 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 15px; 
            box-sizing: border-box; 
            gap: 15px; 
            overflow: hidden; 
        }
        
        .column { 
            display: flex; 
            flex-direction: column; 
            background: var(--bg-col); 
            border-radius: 4px;
            height: 100%; 
            box-sizing: border-box; 
            min-height: 0;
            backdrop-filter: blur(5px);
            border: 1px solid var(--border-ui);
        }

        #col-left { width: 240px; flex-shrink: 0; }
        #col-main { flex: 1; background: var(--bg-card); box-shadow: var(--shadow); }
        #col-right { width: 260px; flex-shrink: 0; }

        .scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px;
            min-height: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--holo-blue) transparent;
        }

        /* Кастомный скроллбар */
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--holo-blue); border-radius: 10px; }

        .card { 
            background: var(--bg-card); 
            padding: 15px; 
            border: 1px solid var(--border-ui); 
            margin-bottom: 10px;
            animation: fadeIn 0.4s ease forwards;
        }
        
        button { 
            background: transparent; 
            border: 1px solid var(--border-accent); 
            padding: 10px 15px; 
            cursor: pointer; 
            font-weight: 500; 
            font-size: 12px; 
            color: var(--text-main); 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            outline: none;
            position: relative;
            overflow: hidden;
        }

        button:hover { 
            background: var(--btn-hover); 
            border-color: var(--holo-blue); 
            color: var(--holo-blue);
            box-shadow: 0 0 8px var(--holo-blue-glow);
        }

        button:active { transform: scale(0.95); }
        
        input, textarea { 
            border: none; 
            border-bottom: 1px solid var(--border-accent); 
            background: rgba(0,0,0,0.03); 
            color: var(--text-main); 
            padding: 12px; 
            margin: 8px 0; 
            width: 100%; 
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        input:focus { 
            border-bottom: 1px solid var(--holo-blue); 
            background: rgba(51, 181, 229, 0.05);
            outline: none;
        }

        /* Улучшенные сообщения */
        .msg-container { 
            display: flex; 
            margin-bottom: 15px; 
            animation: fadeIn 0.3s ease;
            gap: 10px;
        }
        .msg-me { flex-direction: row-reverse; }
        
        .msg-avatar { 
            width: 36px; height: 36px; 
            border-radius: 2px; 
            border: 1px solid var(--border-ui);
            object-fit: cover;
        }

        .msg-content { 
            max-width: 70%; 
            padding: 12px; 
            border: 1px solid var(--border-ui);
            background: var(--bg-col);
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.02);
        }

        .msg-me .msg-content { 
            border-right: 3px solid var(--holo-blue); 
            background: var(--bg-card);
        }

        /* Фикс аватара в профиле */
        #view-avatar {
            width: 80px; height: 80px;
            border: 3px solid var(--holo-blue);
            padding: 3px;
            background: #fff;
            transition: transform 0.3s ease;
        }
        #view-avatar:hover { transform: rotate(3deg) scale(1.05); }

        /* Мобильная навигация */
        .mobile-nav { 
            height: 60px; 
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--holo-blue);
        }

        @media (max-width: 768px) {
            #main-ui { padding: 5px; }
            .column { border: none; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <h1>ЛАСТОЧКА.ru</h1>

    <div id="auth-box" style="display: flex; flex: 1; justify-content: center; align-items: center;">
        <div class="card" style="width: 320px; border-top: 4px solid var(--holo-blue); border-radius: 8px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <span style="font-weight: 100; font-size: 24px; color: var(--holo-blue);">WELCOME</span>
            </div>
            <input type="number" id="my-id-input" placeholder="ID">
            <input type="text" id="my-nick-input" placeholder="Никнейм">
            <input type="password" id="my-pass-input" placeholder="Пароль">
            <button onclick="handleAuth('login')" style="width: 100%; margin-top: 15px; background: var(--holo-blue); color: white; border: none;">Войти</button>
            <button onclick="handleAuth('reg')" style="width: 100%; margin-top: 8px; border-color: var(--holo-blue); color: var(--holo-blue);">Регистрация</button>
        </div>
    </div>

    <div id="main-ui">
        
        <div class="column" id="col-left">
            <div style="padding: 20px; text-align: center;">
                <div style="position: relative; display: inline-block;">
                    <img id="my-avatar-img" src="" style="width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--holo-blue); object-fit: cover;">
                </div>
                <div id="display-nick" style="font-weight: 700; margin-top: 10px; color: var(--holo-blue); font-size: 18px;"></div>
            </div>
            
            <div class="scroll-area">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <button onclick="loadFeed()">🏠 Лента</button>
                    <button onclick="viewProfile(myId)">👤 Мой профиль</button>
                    <button onclick="showSettings()">⚙ Настройки</button>
                </div>

                <div style="margin-top: 25px;">
                    <small style="color: var(--holo-blue); font-weight: 700; font-size: 10px; text-transform: uppercase;">Групповые чаты</small>
                    <div class="groups-list-class" style="margin-top: 10px;"></div>
                </div>
            </div>
        </div>

        <div class="column active-mob" id="col-main">
            <div id="profile-screen" style="display:flex; flex-direction:column; height:100%; min-height:0;">
                <div id="profile-card" style="padding: 25px; border-bottom: 1px solid var(--border-ui); display: flex; gap: 20px; align-items: center;">
                    <img id="view-avatar">
                    <div>
                        <b id="view-nick" style="font-size: 22px; font-weight: 300;"></b><br>
                        <span id="view-id-label" style="background: var(--holo-blue); color: #fff; padding: 2px 6px; font-size: 10px; border-radius: 3px;"></span>
                        <div style="margin-top: 10px; display: flex; gap: 5px;">
                            <button id="write-btn" style="padding: 5px 10px; font-size: 10px; display:none;">Написать</button>
                        </div>
                    </div>
                </div>

                <div class="scroll-area" id="wall-container">
                    <div id="wall-input-area" class="card" style="display:none; border-style: dashed;">
                        <textarea id="post-text" placeholder="Поделись мыслями..." rows="2"></textarea>
                        <button onclick="createPost()" style="width: 100%; margin-top: 5px; background: var(--holo-blue); color: white; border: none;">Опубликовать</button>
                    </div>
                    <div id="wall-posts"></div>
                </div>
            </div>

            <div id="chat-window" style="display:none; flex-direction:column; height:100%; min-height:0;">
                <div style="padding: 15px; background: var(--bg-col); border-bottom: 1px solid var(--holo-blue); display: flex; justify-content: space-between; align-items: center;">
                    <button onclick="showWall()" style="border: none; font-size: 20px;">←</button>
                    <b id="chat-title" style="color: var(--holo-blue);"></b>
                    <div style="width: 40px;"></div>
                </div>
                <div id="messages-list" class="scroll-area" style="background: rgba(0,0,0,0.02);"></div>
                <div style="padding: 15px; border-top: 1px solid var(--border-ui); display: flex; gap: 10px; background: var(--bg-card);">
                    <input type="text" id="msg-input" placeholder="Напишите сообщение..." onkeyup="if(event.keyCode===13) sendMessage()">
                    <button onclick="sendMessage()" style="background: var(--holo-blue); color: white; border: none; padding: 0 20px;">➤</button>
                </div>
            </div>
        </div>

        <div class="column" id="col-right">
            <div style="padding: 15px;">
                <input type="number" id="target-id-input" placeholder="Поиск по ID...">
                <button onclick="goToId()" style="width: 100%; margin-top: 5px;">Найти</button>
            </div>
            
            <div style="padding: 0 15px 10px 15px; border-bottom: 1px solid var(--border-ui);">
                <small style="color: var(--text-sub); text-transform: uppercase; font-size: 10px; font-weight: 700;">Пользователи онлайн</small>
            </div>
            <div id="users-list" class="scroll-area"></div>
        </div>

    </div>

    <div class="mobile-nav" id="mob-nav" style="display:none; position: fixed; bottom: 0; width: 100%; background: var(--bg-card); display: flex; justify-content: space-around; align-items: center; z-index: 1000;">
        <button onclick="loadFeed()" style="border: none; flex: 1; height: 100%;">Лента</button>
        <button onclick="switchTab('col-main'); showWall();" style="border: none; flex: 1; height: 100%; border-left: 1px solid var(--border-ui); border-right: 1px solid var(--border-ui);">Профиль</button>
        <button onclick="switchTab('col-right')" style="border: none; flex: 1; height: 100%;">Люди</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ТВОЯ ЛОГИКА (БЕЗ ИЗМЕНЕНИЙ)
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, myNick, currentChatId;
        const DEFAULT_AVATAR = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLCFpHxyg6G5c4uQQy6U5SlgJr6qq6P6ot7Q&s";

        async function handleAuth(mode) {
            const id = document.getElementById('my-id-input').value;
            const pass = document.getElementById('my-pass-input').value;
            const nick = document.getElementById('my-nick-input').value;

            if (mode === 'reg') {
                if(!nick) return alert("Ник обязателен");
                await _supabase.from('users').insert([{ id_number: id, password: pass, nickname: nick }]);
            }
            
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).eq('password', pass).single();
            if (user) {
                myId = id; myNick = user.nickname;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                if(window.innerWidth <= 768) document.getElementById('mob-nav').style.display = 'flex';
                document.getElementById('display-nick').innerText = myNick;
                document.getElementById('my-avatar-img').src = user.avatar_url || DEFAULT_AVATAR;
                loadUsers(); loadGroups(); viewProfile(myId);
            } else alert("Ошибка!");
        }

        async function viewProfile(userId) {
            switchTab('col-main');
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', userId).single();
            if(!user) return;
            document.getElementById('view-avatar').src = user.avatar_url || DEFAULT_AVATAR;
            document.getElementById('view-nick').innerText = user.nickname;
            document.getElementById('view-id-label').innerText = "ID: " + user.id_number;
            document.getElementById('wall-input-area').style.display = (userId == myId) ? 'block' : 'none';
            
            const writeBtn = document.getElementById('write-btn');
            if(userId != myId) {
                writeBtn.style.display = 'block';
                writeBtn.onclick = () => startPrivateChat(user.id_number, user.nickname);
            } else {
                writeBtn.style.display = 'none';
            }
            loadPosts(userId);
        }

        async function loadPosts(userId) {
            const { data: posts } = await _supabase.from('posts').select('*').eq('author_id', userId).order('created_at', { ascending: false });
            const wall = document.getElementById('wall-posts');
            wall.innerHTML = posts && posts.length ? posts.map(p => `
                <div class="card">
                    <div style="font-size:12px; color:var(--holo-blue); margin-bottom:8px;">${new Date(p.created_at).toLocaleDateString()}</div>
                    <div style="line-height:1.6;">${p.text}</div>
                </div>
            `).join('') : '<div style="text-align:center; padding:20px; color:var(--text-sub);">Нет записей</div>';
        }

        async function createPost() {
            const t = document.getElementById('post-text').value;
            if(!t.trim()) return;
            await _supabase.from('posts').insert([{ author_id: myId, text: t }]);
            document.getElementById('post-text').value = "";
            loadPosts(myId);
        }

        async function loadUsers() {
            const { data } = await _supabase.from('users').select('*').limit(20);
            if(data) document.getElementById('users-list').innerHTML = data.map(u => `
                <div style="padding:12px; border-bottom:1px solid var(--border-ui); cursor:pointer; display:flex; align-items:center; gap:10px;" onclick="viewProfile('${u.id_number}')">
                    <img src="${u.avatar_url || DEFAULT_AVATAR}" style="width:30px; height:30px; border-radius:50%;">
                    <span>${u.nickname}</span>
                </div>
            `).join('');
        }

        async function loadGroups() {
            const { data } = await _supabase.from('groups').select('*');
            if(data) {
                const html = data.map(g => `
                    <div style="padding:10px; cursor:pointer; font-size:13px; border-left:2px solid transparent;" 
                         onmouseover="this.style.borderColor='var(--holo-blue)'" 
                         onmouseout="this.style.borderColor='transparent'"
                         onclick="startGroupChat('${g.id}','${g.name}')">
                        # ${g.name}
                    </div>
                `).join('');
                document.querySelectorAll('.groups-list-class').forEach(el => el.innerHTML = html);
            }
        }

        function startPrivateChat(targetId, targetNick) {
            currentChatId = [myId, targetId].sort().join("_");
            openChatUI(targetNick);
        }

        function startGroupChat(id, name) {
            currentChatId = "group_" + id;
            openChatUI(name);
        }

        function openChatUI(title) {
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = title;
            loadMessages();
        }

        async function loadMessages() {
            if(!currentChatId) return;
            const { data: messages } = await _supabase.from('messages').select('*').eq('chat_id', currentChatId).order('created_at', { ascending: true });
            const box = document.getElementById('messages-list');
            box.innerHTML = (messages || []).map(m => `
                <div class="msg-container ${m.sender_id == myId ? 'msg-me' : ''}">
                    <div class="msg-content">
                        <small style="display:block; font-size:9px; color:var(--holo-blue); margin-bottom:4px;">ID ${m.sender_id}</small>
                        ${m.text}
                    </div>
                </div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;
            await _supabase.from('messages').insert([{ sender_id: myId, chat_id: currentChatId, text: inp.value.trim() }]);
            inp.value = ""; loadMessages();
        }

        function switchTab(id) {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('active-mob'));
            document.getElementById(id).classList.add('active-mob');
        }

        function showWall() { viewProfile(myId); }
        function goToId() { const i = document.getElementById('target-id-input').value; if(i) viewProfile(i); }
        function loadFeed() { alert("Лента новостей в разработке..."); }
        function showSettings() { alert("Настройки профиля скоро появятся!"); }
    </script>
</body>
</html>
