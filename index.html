<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА.ru</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* ИМПОРТ ШРИФТА (Закос под iOS Helvetica Neue) */
        @import url('https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;500&display=swap');

        /* ПЕРЕМЕННЫЕ ТЕМЫ (iOS 7 LIGHT ПО УМОЛЧАНИЮ) */
        :root {
            --bg-main: #EFEFF4; /* Стандартный серый фон iOS */
            --bg-col: #EFEFF4;
            --bg-card: #FFFFFF;
            --text-main: #000000;
            --text-sub: #8E8E93; /* Серый текст iOS */
            --holo-blue: #007AFF; /* Фирменный синий Apple */
            --holo-blue-dark: #0056B3;
            --border-ui: #C8C7CC; /* Цвет разделителей iOS */
            --border-accent: #C8C7CC;
            --btn-bg: transparent;
            --btn-hover: rgba(0, 122, 255, 0.1);
        }

        /* iOS 7 DARK (Для поддержки твоей функции переключения) */
        [data-theme="dark"] {
            --bg-main: #000000;
            --bg-col: #000000;
            --bg-card: #1C1C1E;
            --text-main: #FFFFFF;
            --text-sub: #EBEBF5;
            --holo-blue: #0A84FF;
            --holo-blue-dark: #0060E0;
            --border-ui: #38383A;
            --border-accent: #38383A;
            --btn-bg: transparent;
            --btn-hover: rgba(10, 132, 255, 0.15);
        }

        /* ИНТЕРФЕЙС */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: var(--bg-main) !important; 
            font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            font-size: 15px; 
            color: var(--text-main); 
            font-weight: 400;
        }
        
        body { display: flex; flex-direction: column; transition: background 0.2s; }
        
        /* Navigation Bar iOS 7 */
        h1 { 
            color: var(--text-main) !important; 
            font-size: 17px !important; 
            font-weight: 500 !important; 
            margin: 0; 
            padding: 15px 10px !important; 
            text-align: center; 
            flex-shrink: 0; 
            text-transform: none !important;
            letter-spacing: normal !important;
            background: rgba(248, 248, 248, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--border-ui) !important;
            z-index: 100;
        }
        [data-theme="dark"] h1 {
            background: rgba(28, 28, 30, 0.8) !important;
        }
        
        #auth-box { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg-main); }
        #main-ui { display: none; flex: 1; width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 !important; gap: 0 !important; overflow: hidden; }
        
        .column { display: flex; flex-direction: column; background: var(--bg-col); padding: 0 !important; height: 100%; box-sizing: border-box; }
        #col-left { width: 250px; flex-shrink: 0; border-right: 0.5px solid var(--border-ui); }
        #col-main { flex: 1; background: var(--bg-main) !important; min-width: 400px; box-shadow: none !important; border-right: 0.5px solid var(--border-ui); }
        #col-right { width: 280px; flex-shrink: 0; }

        /* Карточки в стиле секций настроек iOS */
        .card { 
            background: var(--bg-card) !important; 
            padding: 0; 
            margin-bottom: 20px;
            margin-top: 20px; 
            flex-shrink: 0; 
            border-top: 0.5px solid var(--border-ui) !important;
            border-bottom: 0.5px solid var(--border-ui) !important;
            border-left: none !important;
            border-right: none !important;
        }
        
        /* Кнопки iOS (обычно просто текст, без фона) */
        button { 
            background: transparent !important; 
            border: none !important;
            border-radius: 0; 
            padding: 12px 15px !important; 
            cursor: pointer; 
            font-weight: 400 !important; 
            font-size: 16px !important; 
            color: var(--holo-blue) !important; 
            text-transform: none !important;
            text-align: left;
            transition: opacity 0.2s;
            border-bottom: 0.5px solid var(--border-ui) !important;
        }
        button:hover { background: transparent !important; opacity: 0.6; }
        button:active { background: transparent !important; opacity: 0.3; }
        
        /* Переопределение кнопок аутентификации */
        #auth-box button {
             border: 0.5px solid var(--holo-blue) !important;
             border-radius: 4px !important;
             text-align: center;
             margin: 5px;
        }
        #auth-box button:last-child {
             background: var(--holo-blue) !important;
             color: white !important;
        }

        input, textarea { 
            border: none !important;
            border-bottom: 0.5px solid var(--border-ui) !important; 
            background: var(--bg-card) !important; 
            color: var(--text-main) !important; 
            padding: 15px !important; 
            margin: 0 !important; 
            width: 100%; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 16px !important; 
            outline: none;
        }
        input:focus, textarea:focus { border-bottom: 0.5px solid var(--holo-blue) !important; }
        
        .scroll-area { flex: 1; overflow-y: auto; background: var(--bg-main) !important; padding: 0 !important; }
        
        /* Посты (Лента) */
        .post { background: var(--bg-card); border-top: 0.5px solid var(--border-ui); border-bottom: 0.5px solid var(--border-ui); padding: 15px !important; margin-bottom: 10px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .del-btn { color: #FF3B30 !important; border: none !important; background: none; padding: 0 !important; font-size: 14px !important; text-align: right; }
        
        .embedded-img { max-width: 100%; max-height: 300px; display: block; margin-top: 10px; border-radius: 8px !important; border: none !important; }
        
        .tab-header { 
            color: var(--text-sub) !important; 
            padding: 25px 15px 5px 15px !important; 
            margin-bottom: 0 !important; 
            font-weight: 400 !important; 
            font-size: 13px !important;
            text-transform: uppercase !important;
            text-align: left; 
            border-bottom: none !important;
        }

        /* === ЧАТ (iOS 7 iMessage Style) === */
        .msg-container { 
            display: flex; 
            margin-bottom: 4px; 
            padding: 0 10px;
            align-items: flex-end; 
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .msg-container.msg-me { flex-direction: row-reverse; }

        .msg-avatar { 
            width: 28px !important; 
            height: 28px !important; 
            flex-shrink: 0;
            border-radius: 50% !important;
            border: none !important;
            margin-bottom: 5px;
        }

        .msg-content { 
            max-width: 70%; 
            padding: 8px 14px !important; 
            position: relative;
            border: none !important;
            border-radius: 18px !important; /* Круглые края iMessage */
            background: #E5E5EA !important; /* Серый для входящих */
            color: #000000 !important;
            font-size: 16px;
            line-height: 1.3;
        }
        [data-theme="dark"] .msg-container:not(.msg-me) .msg-content {
            background: #2C2C2E !important;
            color: #FFFFFF !important;
        }

        .msg-me .msg-content {
            background: var(--holo-blue) !important; /* Синий для исходящих */
            color: #FFFFFF !important;
        }

        .msg-info { 
            font-size: 11px; 
            margin-bottom: 2px; 
            color: inherit !important; 
            opacity: 0.6;
            display: flex; 
            gap: 5px;
            white-space: nowrap;
        }
        .msg-me .msg-info { flex-direction: row-reverse; }
        .msg-info b { font-weight: 500; text-transform: none !important; }

        #chat-header { 
            background: rgba(248, 248, 248, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-main) !important; 
            padding: 10px !important; 
            font-weight: 500 !important; 
            font-size: 17px !important;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 0.5px solid var(--border-ui) !important;
            z-index: 10;
        }
        [data-theme="dark"] #chat-header { background: rgba(28, 28, 30, 0.8) !important; }
        #chat-header button { border: none !important; font-size: 16px !important; padding: 0 10px !important; }
        
        /* Tab Bar iOS */
        .mobile-nav { 
            display: none; 
            background: rgba(248, 248, 248, 0.85) !important; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--border-ui) !important; 
            flex-shrink: 0; 
            height: 49px; 
            justify-content: space-around; 
            align-items: center; 
        }
        [data-theme="dark"] .mobile-nav { background: rgba(28, 28, 30, 0.85) !important; }
        .mobile-nav button { flex: 1; height: 100%; border: none !important; background: transparent; color: var(--text-sub) !important; font-size: 10px !important; padding: 5px; text-align: center; }
        .mobile-nav button:hover, .mobile-nav button:active { color: var(--holo-blue) !important; opacity: 1; }

        .desktop-only { display: block; }
        .mobile-only { display: none; }

        @media (max-width: 768px) {
            #main-ui { flex-direction: column; padding: 0; gap: 0; }
            .column { width: 100% !important; min-width: 0 !important; display: none; border: none !important; padding: 0; }
            .mobile-nav { display: flex; }
            .column.active-mob { display: flex; }
            h1 { font-size: 17px !important; padding: 15px !important; }
            .desktop-only { display: none !important; }
            .mobile-only { display: block !important; }
        }

        /* Уведомления стиля iOS */
        #notification-container { position: fixed; top: 10px; right: 10px; z-index: 9999; pointer-events: none; bottom: auto; width: calc(100% - 20px); max-width: 400px; }
        .toast { background: rgba(255, 255, 255, 0.95); color: #000; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); margin-top: 10px; font-size: 15px; pointer-events: auto; cursor: pointer; border-left: none; text-align: center; }
        [data-theme="dark"] .toast { background: rgba(28, 28, 30, 0.95); color: #FFF; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-ui); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-sub); }

        /* --- ПЕРЕОПРЕДЕЛЕНИЕ ТВОИХ ИНЛАЙН СТИЛЕЙ ИЗ HTML --- */
        #profile-card { background: var(--bg-card) !important; border-bottom: 0.5px solid var(--border-ui) !important; }
        #inbox-area { background: var(--bg-card) !important; border-bottom: 0.5px solid var(--border-ui) !important; border-top: 0.5px solid var(--border-ui) !important; margin-top: 20px; }
        #wall-input-area { background: var(--bg-card) !important; border-bottom: 0.5px solid var(--border-ui) !important; border-top: 0.5px solid var(--border-ui) !important; margin-top: 20px; padding: 0 !important; }
        #wall-input-area textarea { padding: 15px !important; border: none !important; }
        #wall-input-area > div { border-top: 0.5px solid var(--border-ui); }
        #wall-input-area button { border: none !important; width: 100%; text-align: center; }
        #my-avatar-img, #view-avatar { border-radius: 50% !important; border: none !important; }
        .like-row button { border: none !important; color: var(--holo-blue) !important; text-align: left; padding: 10px 0 !important; }
        .public-chats-list-class, .groups-list-class { border-top: none !important; }
        .public-chats-list-class div, .groups-list-class div, #users-list div { padding: 12px 15px !important; border-bottom: 0.5px solid var(--border-ui) !important; background: var(--bg-card); }
        #chat-window > div:last-child { border-top: 0.5px solid var(--border-ui) !important; padding: 10px !important; background: rgba(248, 248, 248, 0.9) !important; backdrop-filter: blur(10px); }
        #chat-window > div:last-child button { border: none !important; text-align: center; padding: 10px !important; }
        #chat-window > div:last-child input { margin: 0 10px !important; border: 0.5px solid var(--border-ui) !important; border-radius: 18px !important; padding: 5px 15px !important; }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <h1>ЛАСТОЧКА.ru</h1>

    <div id="auth-box">
        <div class="card" style="width:320px; padding: 20px;">
            <strong style="font-size: 18px; color: var(--text-main); font-weight: 400; display: block; margin-bottom: 15px; text-align: center;">Вход в систему</strong>
            <input type="number" id="my-id-input" placeholder="Ваш ID">
            <input type="text" id="my-nick-input" placeholder="Никнейм (Обязательно при регистрации)">
            <input type="password" id="my-pass-input" placeholder="Пароль">
            <input type="text" id="my-avatar-input" placeholder="URL аватара (опционально)">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="handleAuth('reg')" style="flex: 1;">Регистрация</button>
                <button onclick="handleAuth('login')" style="flex: 1; background: var(--holo-blue); color: white; border-color: var(--holo-blue);">Войти</button>
            </div>
        </div>
    </div>

    <div id="main-ui">
        <div class="column" id="col-left">
            <div class="card" style="text-align:center; border: none; background: transparent;">
                <img id="my-avatar-img" src="" style="width:80px; height:80px; border-radius:50%; object-fit: cover; border: 2px solid var(--border-ui);">
                <div id="display-nick" style="font-weight:500; font-size: 16px; margin-top:10px;"></div>
            </div>
            <button onclick="loadFeed()" style="width:100%; margin-bottom:5px; text-align: left;">Лента</button>
            <button onclick="loadFavoritesTab()" style="width:100%; margin-bottom:5px; text-align: left;">Избранные</button>
            <button onclick="showSettings()" style="width:100%; margin-bottom:5px; text-align: left;">Настройки</button>
            <button onclick="showAbout()" style="width:100%; margin-bottom:20px; text-align: left;">О нас</button>

            <div class="desktop-only" style="margin-top: 10px;">
                <strong style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; display:block; padding-left: 15px;">Паблик Чаты</strong>
                <div class="scroll-area public-chats-list-class" style="padding: 0; background: transparent; border-top: 1px solid var(--border-ui); margin-bottom: 10px; max-height: 150px;"></div>
                <button onclick="createPublicChat()" style="width:100%; text-align: center; border-style: dashed; margin-bottom: 15px;">Добавить паблик чат</button>

                <strong style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; display:block; padding-left: 15px;">Группы</strong>
                <div class="scroll-area groups-list-class" style="padding: 0; background: transparent; border-top: 1px solid var(--border-ui); margin-bottom: 10px; max-height: 150px;"></div>
                <button onclick="createGroup()" style="width:100%; text-align: center; border-style: dashed;">Создать группу</button>
            </div>
        </div>

        <div class="column active-mob" id="col-main">
            <div id="profile-screen" style="display:flex; flex-direction:column; height:100%;">
                <div id="profile-card" style="display:flex; align-items:center; gap:15px; padding: 20px; border-bottom: 1px solid var(--border-ui);">
                    <img id="view-avatar" style="width:80px; height:80px; border-radius:0; object-fit:cover; border:1px solid var(--border-accent);">
                    <div style="flex:1;">
                        <b id="view-nick" style="font-size:20px; font-weight: 300;"></b><br>
                        <small id="view-id-label" style="color:var(--text-sub); font-size: 13px;"></small>
                        <div style="font-size:13px; margin-top:8px; color: var(--text-sub);">
                            Подписчики: <b id="count-followers" style="color:var(--text-main);">0</b> &nbsp;|&nbsp; Подписки: <b id="count-following" style="color:var(--text-main);">0</b>
                        </div>
                        <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:8px;">
                            <button id="write-btn" style="display:none; border-color: var(--holo-blue); color: var(--holo-blue);">Написать</button>
                            <button id="follow-btn" style="display:none;">Подписаться</button>
                            <button id="fav-btn" style="display:none;">В избранное</button>
                        </div>
                    </div>
                </div>

                <div id="inbox-area" style="display:none; padding: 15px; background: var(--bg-col); border-bottom: 1px solid var(--border-ui);">
                    <strong style="color:var(--holo-blue); font-size:12px; text-transform: uppercase;">Последние сообщения</strong>
                    <div id="inbox-list" style="margin-top:10px;"></div>
                </div>

                <div class="mobile-only" style="padding: 10px 15px 0 15px;">
                    <button onclick="showSettings()" style="width: 100%; border: 1px dashed var(--holo-blue); color: var(--holo-blue);">Настройки</button>
                </div>

                <div id="wall-input-area" style="padding: 15px; border-bottom: 4px solid var(--bg-col);">
                    <textarea id="post-text" placeholder="Что нового?" rows="2"></textarea>
                    <div style="text-align: right;">
                        <button onclick="createPost()">Опубликовать</button>
                    </div>
                </div>
                <div id="wall-posts" class="scroll-area"></div>
            </div>

            <div id="chat-window" style="display:none; flex-direction:column; height:100%;">
                <div id="chat-header">
                    <button onclick="switchTab('col-left')" style="border:none; padding:5px;">Назад</button>
                    <span id="chat-title" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px;">ДИАЛОГ</span>
                    <button onclick="loadMessages()" style="border:none; padding:5px;">Обновить</button>
                </div>
                <div id="messages-list" class="scroll-area" style="background: var(--bg-main); padding-top: 15px !important;"></div>
                <div style="padding: 10px; border-top: 1px solid var(--border-ui); display:flex; gap:10px; background: var(--bg-card);">
                    <button onclick="sendImagePrompt()" style="width:50px; border-style: dashed;">IMG</button>
                    <input type="text" id="msg-input" placeholder="Сообщение" onkeyup="if(event.keyCode===13) sendMessage()" style="margin:0;">
                    <button onclick="sendMessage()" style="width:80px; background: var(--holo-blue); color: white; border: none;">Отпр</button>
                </div>
            </div>
        </div>

        <div class="column" id="col-right">
            <div class="mobile-only" style="margin-bottom: 20px;">
                <strong style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; display:block; padding-left: 15px;">Паблик Чаты</strong>
                <div class="scroll-area public-chats-list-class" style="padding: 0; background: transparent; border-top: 1px solid var(--border-ui); margin-bottom: 10px; max-height: 150px;"></div>
                <button onclick="createPublicChat()" style="width:100%; text-align: center; border-style: dashed; margin-bottom: 15px;">Добавить паблик чат</button>

                <strong style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; display:block; padding-left: 15px;">Группы</strong>
                <div class="scroll-area groups-list-class" style="padding: 0; background: transparent; border-top: 1px solid var(--border-ui); margin-bottom: 10px; max-height: 150px;"></div>
                <button onclick="createGroup()" style="width:100%; text-align: center; border-style: dashed;">Создать группу</button>
            </div>

            <strong style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px; margin-top: 20px; text-transform: uppercase; padding-left: 15px; display: block;">Поиск по ID</strong>
            <div style="display:flex; gap:5px; margin-bottom: 20px; padding: 0 15px;">
                <input type="number" id="target-id-input" style="margin:0; border: 0.5px solid var(--border-ui) !important; border-radius: 4px;">
                <button onclick="goToId()">Go</button>
            </div>
            
            <strong style="color: var(--text-sub); font-size: 12px; margin-bottom: 5px; text-transform: uppercase; padding-left: 15px; display: block;">Пользователи</strong>
            <div id="users-list" class="scroll-area" style="padding: 0; background: transparent;"></div>
        </div>
    </div>

    <div class="mobile-nav" id="mob-nav">
        <button onclick="loadFeed()">Лента</button>
        <button onclick="switchTab('col-main'); showWall();">Профиль</button>
        <button onclick="switchTab('col-right')">Люди</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, myNick, currentChatId;
        const DEFAULT_AVATAR = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLCFpHxyg6G5c4uQQy6U5SlgJr6qq6P6ot7Q&s";
        let userCache = {};

        window.onload = async () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) setTheme(savedTheme);
            const savedBg = localStorage.getItem('custom_bg');
            if (savedBg) { document.body.style.backgroundImage = `url('${savedBg}')`; document.body.style.backgroundSize = 'cover'; document.body.style.backgroundPosition = 'center'; document.body.style.backgroundAttachment = 'fixed'; }
            const sId = localStorage.getItem('saved_user_id');
            const sPass = localStorage.getItem('saved_user_pass');
            if (sId && sPass) {
                const { data: user } = await _supabase.from('users').select('*').eq('id_number', sId).eq('password', sPass).single();
                if (user) { myId = sId; myNick = user.nickname; startApp(user); }
            }
        };

        function startApp(user) {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            if(window.innerWidth <= 768) document.getElementById('mob-nav').style.display = 'flex';
            document.getElementById('display-nick').innerText = user.nickname;
            document.getElementById('my-avatar-img').src = user.avatar_url || DEFAULT_AVATAR;
            loadGroups(); loadUsers(); viewProfile(myId); initRealtime();
        }

        async function handleAuth(mode) {
            const id = document.getElementById('my-id-input').value.trim();
            const pass = document.getElementById('my-pass-input').value.trim();
            const nick = document.getElementById('my-nick-input').value.trim();
            let av = document.getElementById('my-avatar-input').value.trim() || DEFAULT_AVATAR;

            if (mode === 'reg') {
                if (!nick) {
                    alert("Ошибка: Никнейм обязателен для регистрации!");
                    return;
                }
                await _supabase.from('users').insert([{ id_number: id, password: pass, nickname: nick, avatar_url: av }]);
            }

            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).eq('password', pass).single();
            if (user) {
                myId = id; myNick = user.nickname;
                localStorage.setItem('saved_user_id', id);
                localStorage.setItem('saved_user_pass', pass);
                startApp(user);
            } else alert("Ошибка входа! Проверьте данные.");
        }

        function logout() {
            localStorage.removeItem('saved_user_id');
            localStorage.removeItem('saved_user_pass');
            location.reload();
        }

        function setTheme(theme) {
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            else document.documentElement.removeAttribute('data-theme');
            localStorage.setItem('theme', theme);
        }

        async function viewProfile(userId) {
            switchTab('col-main');
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            document.getElementById('profile-card').style.display = 'flex';
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', userId).single();
            if(!user) return;
            document.getElementById('view-avatar').src = user.avatar_url || DEFAULT_AVATAR;
            document.getElementById('view-nick').innerText = user.nickname;
            document.getElementById('view-id-label').innerText = "ID: " + user.id_number;
            const isMe = (userId == myId);
            document.getElementById('wall-input-area').style.display = isMe ? 'block' : 'none';
            document.getElementById('inbox-area').style.display = isMe ? 'block' : 'none';
            document.getElementById('write-btn').style.display = isMe ? 'none' : 'block';
            document.getElementById('follow-btn').style.display = isMe ? 'none' : 'block';
            document.getElementById('fav-btn').style.display = isMe ? 'none' : 'block';
            if(!isMe) { document.getElementById('write-btn').onclick = () => openPrivate(user.id_number, user.nickname); checkFollowStatus(userId); checkFavoriteStatus(userId); } else loadInbox();
            updateFollowCounts(userId); loadPosts(userId);
        }

        async function createPost() {
            const t = document.getElementById('post-text').value.trim();
            if(!t) return;
            await _supabase.from('posts').insert([{ author_id: myId, text: t, likes: 0, liked_by: [] }]);
            document.getElementById('post-text').value = ""; viewProfile(myId);
        }

        async function loadPosts(userId) {
            const { data: posts } = await _supabase.from('posts').select('*').eq('author_id', userId).order('created_at', { ascending: false });
            const wall = document.getElementById('wall-posts');
            wall.innerHTML = '';
            if(posts) {
                posts.forEach(p => {
                    const isLiked = (p.liked_by || []).includes(String(myId));
                    const div = document.createElement('div');
                    div.className = 'post';
                    div.innerHTML = `<div class="post-header"><small style="color:var(--text-sub);">${new Date(p.created_at).toLocaleDateString()}</small>${p.author_id == myId ? `<button class="del-btn" onclick="deletePost('${p.id}')">Удалить</button>` : ''}</div><div style="margin-top:5px; font-size:15px; line-height: 1.4;">${parseContent(p.text)}</div><div class="like-row"><button onclick="toggleLike('${p.id}', '${userId}')" class="${isLiked?'like-btn active':'like-btn'}">Нравится (${p.likes || 0})</button></div>`;
                    wall.appendChild(div);
                });
            }
        }

        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim() || !currentChatId) return;
            await _supabase.from('messages').insert([{ sender_id: myId, chat_id: currentChatId, text: inp.value.trim() }]);
            inp.value = ""; loadMessages();
        }

        async function loadMessages() {
            if(!currentChatId) return;
            const { data: messages } = await _supabase.from('messages').select('*').eq('chat_id', currentChatId).order('created_at', { ascending: true });
            const box = document.getElementById('messages-list');
            const senderIds = [...new Set(messages.map(m => m.sender_id))];
            const { data: users } = await _supabase.from('users').select('id_number, nickname, avatar_url').in('id_number', senderIds);
            if(users) users.forEach(u => userCache[u.id_number] = u);

            box.innerHTML = (messages || []).map(m => {
                const user = userCache[m.sender_id] || { nickname: 'User', avatar_url: DEFAULT_AVATAR };
                const isMe = m.sender_id == myId; // Проверка: я отправитель или нет
                return `
                <div class="msg-container ${isMe ? 'msg-me' : ''}">
                    <img src="${user.avatar_url}" class="msg-avatar">
                    <div class="msg-content">
                        <div class="msg-info">
                            <b>${user.nickname}</b>
                            <span>${new Date(m.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div style="font-size:16px; word-break: break-word;">${parseContent(m.text)}</div>
                    </div>
                </div>`;
            }).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function openPrivate(id, nick) {
            currentChatId = [myId, id].sort().join("_");
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = nick;
            switchTab('col-main'); loadMessages();
        }

        function switchTab(id) {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('active-mob'));
            document.getElementById(id).classList.add('active-mob');
        }

        function parseContent(str) {
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            return str.replace(urlPattern, (u) => u.match(/\.(jpg|jpeg|png|gif|webp)$/i) ? `<img src="${u}" class="embedded-img" onclick="window.open('${u}')">` : `<a href="${u}" target="_blank" style="color:var(--holo-blue); text-decoration:none;">${u}</a>`);
        }

        function showSettings() {
            clearMainArea();
            const wall = document.getElementById('wall-posts');
            const currentBg = localStorage.getItem('custom_bg') || '';
            wall.innerHTML = `<div class="tab-header">Настройки</div><div class="card"><label style="color:var(--holo-blue); font-size:12px; padding-left:15px; display:block; padding-top:15px;">НИКНЕЙМ</label><input type="text" id="set-nick" value="${myNick}"><label style="color:var(--holo-blue); font-size:12px; padding-left:15px; display:block; padding-top:15px;">URL АВАТАРА</label><input type="text" id="set-av"><label style="color:var(--holo-blue); font-size:12px; padding-left:15px; display:block; padding-top:15px;">URL КАСТОМНОГО ФОНА</label><input type="text" id="set-bg" value="${currentBg}"><button onclick="updateProfile()" style="margin-top:15px; width:100%; text-align:center;">Сохранить изменения</button></div><div class="card" style="margin-top: 20px;"><strong style="padding:15px; display:block; font-weight:400;">ОФОРМЛЕНИЕ:</strong><div style="display:flex; flex-direction:column;"><button onclick="setTheme('light')" style="width:100%; padding-left:15px !important;">Светлая тема (iOS 7)</button><button onclick="setTheme('dark')" style="width:100%; border-bottom:none !important; padding-left:15px !important;">Темная тема</button></div></div><div class="card"><button onclick="logout()" style="color:#FF3B30 !important; width:100%; text-align:center; border:none !important;">Выйти из аккаунта</button></div>`;
        }

        async function updateProfile() {
            const nick = document.getElementById('set-nick').value;
            const av = document.getElementById('set-av').value;
            const bg = document.getElementById('set-bg').value;
            
            localStorage.setItem('custom_bg', bg);

            let up = { nickname: nick };
            if(av) up.avatar_url = av;
            await _supabase.from('users').update(up).eq('id_number', myId);
            location.reload(); 
        }

        function clearMainArea() {
            switchTab('col-main');
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            document.getElementById('profile-card').style.display = 'none';
            document.getElementById('wall-input-area').style.display = 'none';
            document.getElementById('inbox-area').style.display = 'none';
            document.getElementById('wall-posts').innerHTML = '';
        }

        async function loadFeed() {
            clearMainArea();
            const { data: posts } = await _supabase.from('posts').select('*').order('created_at', { ascending: false }).limit(50);
            const wall = document.getElementById('wall-posts');
            wall.innerHTML = '<div class="tab-header">Лента</div>';
            if(posts) {
                posts.forEach(p => {
                    const isLiked = (p.liked_by || []).includes(String(myId));
                    const div = document.createElement('div');
                    div.className = 'post';
                    div.innerHTML = `<div class="post-header"><b style="color:var(--text-main); font-size:16px; font-weight:500; cursor:pointer;" onclick="viewProfile('${p.author_id}')">ID ${p.author_id}</b><small style="color:var(--text-sub);">${new Date(p.created_at).toLocaleDateString()}</small></div><div style="margin-top:5px; font-size:15px; line-height: 1.4;">${parseContent(p.text)}</div><div class="like-row"><button onclick="toggleLike('${p.id}', null, true)" class="${isLiked?'like-btn active':'like-btn'}">Нравится (${p.likes || 0})</button></div>`;
                    wall.appendChild(div);
                });
            }
        }

        function initRealtime() {
            _supabase.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
                const m = payload.new;
                if(m.sender_id != myId) {
                    if(currentChatId === m.chat_id) loadMessages();
                    else if(m.chat_id.includes(myId) || m.chat_id.startsWith("group_")) showToast(m.sender_id, m.text);
                }
            }).subscribe();
        }

        function showToast(senderId, text) {
            const container = document.getElementById('notification-container');
            const t = document.createElement('div'); t.className = 'toast';
            t.innerHTML = `Новое сообщение<br><span style="color:var(--text-sub); font-size:13px;">${text.substring(0,30)}...</span>`;
            t.onclick = () => viewProfile(senderId);
            container.appendChild(t); setTimeout(() => t.remove(), 5000);
        }

        async function loadUsers() {
            const { data } = await _supabase.from('users').select('*');
            if(data) document.getElementById('users-list').innerHTML = data.map(u => `<div style="padding:10px 15px; border-bottom:0.5px solid var(--border-ui); cursor:pointer; display:flex; align-items:center; gap:10px;" onclick="viewProfile('${u.id_number}')"><img src="${u.avatar_url || DEFAULT_AVATAR}" style="width:36px; height:36px; border-radius:50%; border:none;"> ${u.nickname}</div>`).join('');
        }

        async function loadGroups() {
            const { data } = await _supabase.from('groups').select('*');
            if(data) {
                const publics = data.filter(g => g.name.startsWith('[PUB] '));
                const normals = data.filter(g => !g.name.startsWith('[PUB] '));
                const htmlPublics = publics.map(g => `<div style="padding:12px 15px; border-bottom:0.5px solid var(--border-ui); cursor:pointer; font-size:15px; display:flex; align-items:center; gap:10px;" onclick="startGroupChat('${g.id}','${g.name.replace('[PUB] ', '')}')"><span style="color:white; background:var(--holo-blue); border-radius:4px; padding:2px 5px; font-size:10px;">PUB</span> ${g.name.replace('[PUB] ', '')}</div>`).join('');
                document.querySelectorAll('.public-chats-list-class').forEach(el => el.innerHTML = htmlPublics);
                const htmlNormals = normals.map(g => `<div style="padding:12px 15px; border-bottom:0.5px solid var(--border-ui); cursor:pointer; font-size:15px;" onclick="startGroupChat('${g.id}','${g.name}')"><span style="color:var(--text-sub); margin-right:5px;">#</span> ${g.name}</div>`).join('');
                document.querySelectorAll('.groups-list-class').forEach(el => el.innerHTML = htmlNormals);
            }
        }

        function createPublicChat() { 
            const n = prompt("Название паблик чата:"); 
            if(n) _supabase.from('groups').insert([{name: '[PUB] ' + n}]).then(loadGroups); 
        }

        function startGroupChat(id, name) {
            currentChatId = "group_" + id;
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            switchTab('col-main'); loadMessages();
        }

        async function toggleLike(postId, authorId, isFeed = false) {
            const { data: post } = await _supabase.from('posts').select('likes, liked_by').eq('id', postId).single();
            if (!post) return;
            let likedBy = post.liked_by || [];
            let likesCount = parseInt(post.likes) || 0;
            const uid = String(myId);
            if (likedBy.includes(uid)) { likedBy = likedBy.filter(i => i !== uid); likesCount = Math.max(0, likesCount - 1); } 
            else { likedBy.push(uid); likesCount++; }
            await _supabase.from('posts').update({ likes: likesCount, liked_by: likedBy }).eq('id', postId);
            if(isFeed) loadFeed(); else loadPosts(authorId);
        }

        async function loadInbox() {
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(40);
            const list = document.getElementById('inbox-list');
            if(!data) return;
            const res = []; const seen = new Set();
            for(let m of data) {
                if(m.sender_id == myId) continue;
                if(m.chat_id.includes(myId) || m.chat_id.startsWith("group_")) {
                    if(!seen.has(m.chat_id)) { seen.add(m.chat_id); res.push(m); }
                }
                if(res.length >= 5) break;
            }
            list.innerHTML = res.map(m => `<div style="border-bottom:0.5px solid var(--border-ui); padding:12px 0; cursor:pointer; font-size:15px;" onclick="openChatById('${m.chat_id}')"><b style="font-weight:500;">${m.chat_id.startsWith('group_')?'ГРУППА':'ID '+m.sender_id}</b><br><span style="color:var(--text-sub);">${m.text.substring(0,35)}</span></div>`).join('');
        }

        async function openChatById(chatId) {
            if(chatId.startsWith("group_")) {
                const gid = chatId.replace("group_", "");
                const {data} = await _supabase.from('groups').select('name').eq('id', gid).single();
                if(data) startGroupChat(gid, data.name);
            } else {
                const tid = chatId.split('_').find(x => x != myId);
                const {data} = await _supabase.from('users').select('nickname').eq('id_number', tid).single();
                if(data) openPrivate(tid, data.nickname);
            }
        }

        function showAbout() {
            clearMainArea();
            document.getElementById('wall-posts').innerHTML = `<div class="tab-header">О ПРОЕКТЕ</div><div style="line-height:1.6; padding:30px;"><strong style="font-size:24px; font-weight:300; color:var(--text-main);">Ласточка.ru</strong><br><span style="color:var(--text-sub);">Все права защищены!</span><br><br>Ласточка.ru это мессенджер где ваши данные будут защищены.</div>`;
        }
        
        function showWall() { viewProfile(myId); }
        function goToId() { const i = document.getElementById('target-id-input').value; if(i) viewProfile(i); }
        function createGroup() { const n = prompt("Название группы:"); if(n) _supabase.from('groups').insert([{name:n}]).then(loadGroups); }
        function sendImagePrompt() { const url = prompt("Вставь URL картинки:"); if(url) { document.getElementById('msg-input').value = url; sendMessage(); } }
        async function deletePost(postId) { if(!confirm("Удалить этот пост?")) return; await _supabase.from('posts').delete().eq('id', postId).eq('author_id', myId); viewProfile(myId); }
        async function checkFollowStatus(id) { const { data } = await _supabase.from('follows').select('*').eq('follower_id', myId).eq('following_id', id).single(); const btn = document.getElementById('follow-btn'); btn.innerText = data ? "Отписаться" : "Подписаться"; btn.onclick = () => toggleFollow(id, !!data); }
        async function toggleFollow(id, isF) { if(isF) await _supabase.from('follows').delete().eq('follower_id', myId).eq('following_id', id); else await _supabase.from('follows').insert([{follower_id:myId, following_id:id}]); viewProfile(id); }
        async function updateFollowCounts(id) { const { count: f1 } = await _supabase.from('follows').select('*', { count: 'exact' }).eq('following_id', id); const { count: f2 } = await _supabase.from('follows').select('*', { count: 'exact' }).eq('follower_id', id); document.getElementById('count-followers').innerText = f1 || 0; document.getElementById('count-following').innerText = f2 || 0; }
        async function checkFavoriteStatus(id) { const btn = document.getElementById('fav-btn'); const { data } = await _supabase.from('favorites').select('*').eq('user_id', myId).eq('favorite_id', id).single(); btn.innerText = data ? "Удалить из избранного" : "В избранное"; btn.onclick = () => toggleFavorite(id, !!data); }
        async function toggleFavorite(id, isFav) { if(isFav) await _supabase.from('favorites').delete().eq('user_id', myId).eq('favorite_id', id); else await _supabase.from('favorites').insert([{user_id: myId, favorite_id: id}]); checkFavoriteStatus(id); }
        async function loadFavoritesTab() { clearMainArea(); const wall = document.getElementById('wall-posts'); wall.innerHTML = '<div class="tab-header">Избранные</div>'; const { data: favs } = await _supabase.from('favorites').select('favorite_id').eq('user_id', myId); if(!favs || favs.length === 0) { wall.innerHTML += '<div style="padding:20px; color:var(--text-sub);\">Нет избранных.</div>'; return; } const { data: users } = await _supabase.from('users').select('*').in('id_number', favs.map(f => f.favorite_id)); if(users) { users.forEach(u => { const div = document.createElement('div'); div.style.display = 'flex'; div.style.alignItems = 'center'; div.style.gap = '15px'; div.style.cursor = 'pointer'; div.style.padding = '12px 15px'; div.style.borderBottom = '0.5px solid var(--border-ui)'; div.style.background = 'var(--bg-card)'; div.onclick = () => viewProfile(u.id_number); div.innerHTML = `<img src="${u.avatar_url || DEFAULT_AVATAR}" style="width:46px; height:46px; border-radius:50%; object-fit:cover; border:none;"><b style="font-size:16px; font-weight:400;">${u.nickname}</b> <small style="color:var(--text-sub);">(ID: ${u.id_number})</small>`; wall.appendChild(div); }); } }
    </script>
</body>
</html>
