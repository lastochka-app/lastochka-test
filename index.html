<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА.ru — Viber 4.0 Style</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --v-dark-purple: #5941A9; /* Темный фиолетовый для шапки */
            --v-accent-purple: #7360F2; /* Акцентный фиолетовый */
            --v-bg-list: #E9E9EB; /* Фон списка контактов */
            --v-bg-main: #FFFFFF; /* Фон основной области */
            --v-border: #D1D1D1;
            --text-gray: #777777;
        }

        * { box-sizing: border-box; }
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: var(--v-bg-main); }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        header {
            height: 50px;
            background: var(--v-dark-purple);
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            justify-content: space-between;
        }

        .nav-icons { display: flex; gap: 30px; align-items: center; }
        .nav-icons span { font-size: 20px; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .nav-icons span:hover, .nav-icons span.active { opacity: 1; border-bottom: 3px solid white; padding-bottom: 5px; }
        
        .right-icons { display: flex; gap: 20px; font-size: 18px; }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        #main-container { display: flex; height: calc(100% - 50px); }

        /* ЛЕВАЯ КОЛОНКА (СПИСОК) */
        #sidebar {
            width: 320px;
            background: var(--v-bg-list);
            border-right: 1px solid var(--v-border);
            display: flex;
            flex-direction: column;
        }

        .list-header { padding: 10px 15px; font-size: 11px; color: var(--text-gray); font-weight: bold; }
        .contact-group-label { padding: 5px 15px; font-size: 12px; color: var(--v-dark-purple); font-weight: bold; }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            cursor: pointer;
            transition: 0.1s;
            border-bottom: 1px solid #E0E0E0;
        }
        .contact-item:hover { background: #dfdfe1; }
        .contact-item.active { background: var(--v-accent-purple); color: white; }
        .contact-item.active .v-label { color: white !important; }

        .avatar { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; margin-left: auto; border: 1px solid #ccc; }
        .contact-info { flex: 1; }
        .contact-name { font-size: 15px; font-weight: 500; }
        .v-label { font-size: 10px; color: var(--v-dark-purple); display: flex; align-items: center; gap: 3px; }

        /* ПРАВАЯ КОЛОНКА (КОНТЕНТ) */
        #content-area { flex: 1; overflow-y: auto; background: white; }

        .profile-view { padding: 30px; display: flex; gap: 25px; }
        .big-avatar { width: 220px; height: 220px; border: 1px solid #ddd; object-fit: cover; }
        
        .profile-info { flex: 1; }
        .profile-info h2 { margin: 0; font-size: 28px; font-weight: normal; }
        .status-online { color: #8DC34B; font-size: 14px; margin-bottom: 20px; display: block; }

        .btn-row { display: flex; gap: 10px; margin-top: 20px; }
        .v-btn { 
            background: var(--v-accent-purple); 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 2px;
            min-width: 180px;
        }
        .v-btn:hover { background: var(--v-dark-purple); }

        .phone-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; }
        .phone-label { color: #999; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .phone-row { display: flex; justify-content: space-between; align-items: center; }

        /* ВХОД */
        #auth-screen { position: fixed; inset: 0; background: var(--v-dark-purple); z-index: 100; display: flex; justify-content: center; align-items: center; color: white; }

        @media (max-width: 768px) {
            #sidebar { width: 100%; }
            #content-area { display: none; }
            #content-area.mobile-visible { display: block; position: fixed; inset: 0; z-index: 50; padding-top: 50px;}
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="width: 300px; text-align: center;">
            <h1 style="font-size: 40px; margin-bottom: 10px;">ЛАСТОЧКА</h1>
            <input type="number" id="my-id-input" placeholder="Ваш ID" style="width:100%; padding:10px; margin:5px 0;">
            <input type="password" id="my-pass-input" placeholder="Пароль" style="width:100%; padding:10px; margin:5px 0;">
            <button onclick="handleAuth()" style="width:100%; padding:12px; background: white; color: var(--v-dark-purple); border:none; font-weight:bold; cursor:pointer; margin-top:10px;">ВОЙТИ</button>
        </div>
    </div>

    <header>
        <div class="nav-icons">
            <span title="Чаты">💬</span>
            <span title="Контакты" class="active">👤</span>
            <span title="Журнал">🕒</span>
        </div>
        <div class="right-icons">
            <span>★</span>
            <span>🔍</span>
            <span>⋮</span>
        </div>
    </header>

    <div id="main-container">
        <div id="sidebar">
            <div class="list-header">You <span style="float:right;">194 contacts</span></div>
            <div id="contacts-list" style="overflow-y: auto;">
                </div>
        </div>

        <div id="content-area">
            <div id="profile-placeholder" style="text-align:center; padding-top:100px; color:#999;">
                Выберите контакт для начала общения
            </div>
            
            <div id="profile-details" style="display:none;">
                <div class="profile-view">
                    <img id="p-avatar" class="big-avatar" src="">
                    <div class="profile-info">
                        <h2 id="p-name">Имя пользователя</h2>
                        <span class="status-online">Online</span>
                        
                        <div class="btn-row">
                            <button class="v-btn" onclick="alert('Вызов...')">Free Call</button>
                            <button class="v-btn" onclick="startChat()">Free Message</button>
                        </div>

                        <div class="phone-section">
                            <span class="phone-label">Phone</span>
                            <div class="phone-row">
                                <span id="p-id-label">ID: 000000</span>
                                <span style="font-size: 20px;">📠</span>
                            </div>
                            <small style="color:#aaa;">Regular call</small>
                        </div>
                    </div>
                </div>
            </div>

            <div id="chat-box" style="display:none; flex-direction:column; height:100%;">
                <div style="padding:15px; border-bottom:1px solid #ddd; font-weight:bold; display:flex; justify-content:space-between;">
                    <span id="chat-with-name">Чат</span>
                    <button onclick="closeChat()" style="border:none; background:none; cursor:pointer; color:var(--v-accent-purple);">ЗАКРЫТЬ</button>
                </div>
                <div id="messages" style="flex:1; overflow-y:auto; padding:15px; background:#DADBD3;"></div>
                <div style="padding:10px; display:flex; gap:10px; background:#eee;">
                    <input type="text" id="m-input" placeholder="Введите сообщение..." style="flex:1; padding:10px; border:1px solid #ccc; border-radius:20px;">
                    <button onclick="sendMsg()" style="background:var(--v-accent-purple); color:white; border:none; padding:0 20px; border-radius:20px;">ОТПР.</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, currentTargetId;
        const DEFAULT_AVATAR = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLCFpHxyg6G5c4uQQy6U5SlgJr6qq6P6ot7Q&s";

        async function handleAuth() {
            const id = document.getElementById('my-id-input').value;
            const pass = document.getElementById('my-pass-input').value;
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).eq('password', pass).single();
            if (user) {
                myId = id;
                document.getElementById('auth-screen').style.display = 'none';
                loadContacts();
            } else alert("Ошибка входа!");
        }

        async function loadContacts() {
            const { data: users } = await _supabase.from('users').select('*');
            const list = document.getElementById('contacts-list');
            list.innerHTML = '<div class="contact-group-label">A</div>'; // Упростим сортировку
            
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.onclick = () => showProfile(u);
                div.innerHTML = `
                    <div class="contact-info">
                        <div class="contact-name">${u.nickname}</div>
                        <div class="v-label">📞 Viber</div>
                    </div>
                    <img src="${u.avatar_url || DEFAULT_AVATAR}" class="avatar">
                `;
                list.appendChild(div);
            });
        }

        function showProfile(user) {
            currentTargetId = user.id_number;
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.getElementById('profile-placeholder').style.display = 'none';
            document.getElementById('chat-box').style.display = 'none';
            document.getElementById('profile-details').style.display = 'block';

            document.getElementById('p-name').innerText = user.nickname;
            document.getElementById('p-avatar').src = user.avatar_url || DEFAULT_AVATAR;
            document.getElementById('p-id-label').innerText = "ID: " + user.id_number;

            if(window.innerWidth <= 768) document.getElementById('content-area').classList.add('mobile-visible');
        }

        function startChat() {
            document.getElementById('profile-details').style.display = 'none';
            document.getElementById('chat-box').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = "Чат с ID " + currentTargetId;
            loadMessages();
        }

        function closeChat() {
            document.getElementById('chat-box').style.display = 'none';
            document.getElementById('profile-details').style.display = 'block';
        }

        async function sendMsg() {
            const txt = document.getElementById('m-input').value;
            if(!txt) return;
            const chatId = [myId, currentTargetId].sort().join("_");
            await _supabase.from('messages').insert([{ sender_id: myId, chat_id: chatId, text: txt }]);
            document.getElementById('m-input').value = "";
            loadMessages();
        }

        async function loadMessages() {
            const chatId = [myId, currentTargetId].sort().join("_");
            const { data: msgs } = await _supabase.from('messages').select('*').eq('chat_id', chatId).order('created_at', {ascending: true});
            const box = document.getElementById('messages');
            box.innerHTML = msgs.map(m => `
                <div style="margin-bottom:10px; text-align: ${m.sender_id == myId ? 'right' : 'left'}">
                    <div style="display:inline-block; padding:8px 12px; border-radius:10px; background:${m.sender_id == myId ? '#E1FFC7' : '#FFF'}; box-shadow: 0 1px 1px #999;">
                        ${m.text}
                    </div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
