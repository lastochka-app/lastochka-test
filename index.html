<!DOCTYPE html>
<html lang="ru">
<head>
    <title>ЛАСТОЧКА.ru | ТЕКСТ-ОНЛИ</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* ПЕРЕМЕННЫЕ ТЕМЫ (Классика XP / Win7) */
        :root {
            --bg-main: #ECE9D8;
            --bg-col: #F0F0F0;
            --bg-card: #ffffff;
            --text-main: #000000;
            --text-blue: #2D5082;
            --border-ui: #D4D0C8;
            --border-accent: #7EA4D0;
            --btn-grad: linear-gradient(to bottom, #ffffff 0%, #e0e0e0 100%);
        }

        [data-theme="dark"] {
            --bg-main: #1A1A1B;
            --bg-col: #2D2D2E;
            --bg-card: #3D3D3E;
            --text-main: #E0E0E0;
            --text-blue: #8AB4F8;
            --border-ui: #444445;
            --border-accent: #5F6368;
            --btn-grad: linear-gradient(to bottom, #444 0%, #222 100%);
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-main); font-family: Tahoma, sans-serif; font-size: 12px; color: var(--text-main); }
        body { display: flex; flex-direction: column; transition: background 0.2s; }
        h1 { color: var(--text-blue); font-size: 18px; margin: 5px; text-shadow: 1px 1px var(--bg-card); text-align: center; flex-shrink: 0; letter-spacing: 2px; }
        
        #auth-box { flex: 1; display: flex; justify-content: center; align-items: center; background: var(--bg-main); }
        #main-ui { display: none; flex: 1; width: 100%; max-width: 1400px; margin: 0 auto; padding: 10px; box-sizing: border-box; gap: 10px; overflow: hidden; }
        
        .column { display: flex; flex-direction: column; background: var(--bg-col); border: 1px solid var(--border-ui); padding: 8px; height: 100%; box-sizing: border-box; }
        #col-left { width: 220px; flex-shrink: 0; }
        #col-main { flex: 1; background: var(--bg-card); border: 1px solid var(--border-accent); min-width: 350px; position: relative; }
        #col-right { width: 250px; flex-shrink: 0; }

        .card { border: 1px solid var(--border-accent); background: var(--bg-card); padding: 8px; margin-bottom: 8px; }
        button { background: var(--btn-grad); border: 1px solid #707070; border-radius: 2px; padding: 4px 8px; cursor: pointer; font-weight: bold; font-size: 11px; color: var(--text-main); outline: none; }
        button:active { background: #bbb; box-shadow: inset 1px 1px 2px #888; }
        input, textarea { border: 1px solid var(--border-accent); background: var(--bg-card); color: var(--text-main); padding: 5px; margin: 3px 0; width: 100%; box-sizing: border-box; font-family: Tahoma; font-size: 11px; }
        
        .scroll-area { flex: 1; overflow-y: auto; background: var(--bg-card); border: 1px solid var(--border-accent); padding: 5px; }
        .post { border-bottom: 1px solid var(--bg-main); padding: 8px 0; }
        .embedded-img { max-width: 100%; border: 1px solid var(--border-ui); margin-top: 5px; cursor: zoom-in; }
        
        #chat-header { background: var(--text-blue); color: white; padding: 8px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* СТИЛЬ СООБЩЕНИЙ */
        .msg-line { margin-bottom: 8px; padding: 5px; border-left: 3px solid var(--border-accent); background: var(--bg-col); }
        .msg-author { font-weight: bold; color: var(--text-blue); font-size: 10px; }
        .msg-text { margin-top: 2px; white-space: pre-wrap; word-break: break-word; }

        .mobile-nav { display: none; background: var(--border-ui); height: 50px; justify-content: space-around; align-items: center; }
        
        @media (max-width: 768px) {
            #main-ui { flex-direction: column; padding: 0; gap: 0; }
            .column { width: 100% !important; display: none; border: none; }
            .mobile-nav { display: flex; }
            .column.active-mob { display: flex; }
        }

        #notification-container { position: fixed; top: 10px; right: 10px; z-index: 9999; }
        .toast { background: var(--text-blue); color: white; padding: 10px; border: 2px solid #fff; margin-bottom: 5px; font-size: 11px; }
    </style>
</head>
<body>

    <div id="notification-container"></div>
    <h1>ЛАСТОЧКА // TELEGRAM CLONE</h1>

    <div id="auth-box">
        <div class="card" style="width:280px; box-shadow: 5px 5px 0px rgba(0,0,0,0.1);">
            <div style="background: var(--text-blue); color:white; padding:5px; margin:-8px -8px 10px -8px; font-weight:bold;">ВХОД В СЕТЬ</div>
            <input type="number" id="my-id-input" placeholder="ID (цифры)">
            <input type="text" id="my-nick-input" placeholder="Никнейм">
            <input type="password" id="my-pass-input" placeholder="Пароль">
            <input type="text" id="my-avatar-input" placeholder="URL аватара">
            <button onclick="handleAuth('login')" style="width:100%; margin-top:10px;">ВОЙТИ</button>
            <button onclick="handleAuth('reg')" style="width:100%; margin-top:5px;">СОЗДАТЬ АККАУНТ</button>
        </div>
    </div>

    <div id="main-ui">
        <div class="column" id="col-left">
            <div class="card" style="text-align:center;">
                <img id="my-avatar-img" src="" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--border-accent); object-fit: cover;">
                <div id="display-nick" style="font-weight:bold; color:var(--text-blue); margin-top:5px;"></div>
                <small id="display-id" style="opacity:0.6;"></small>
            </div>
            
            <button onclick="loadFeed()" style="width:100%; margin-bottom:5px;">ГЛОБАЛЬНАЯ ЛЕНТА</button>
            <button onclick="loadFavoritesTab()" style="width:100%; margin-bottom:5px;">ИЗБРАННЫЕ</button>
            
            <div style="margin: 10px 0 5px 0; font-weight:bold; border-bottom:1px solid var(--border-ui);">МОИ ЧАТЫ:</div>
            <div id="inbox-list" class="scroll-area" style="background: #f9f9f9;"></div>
            
            <div style="margin: 10px 0 5px 0; font-weight:bold; border-bottom:1px solid var(--border-ui);">ГРУППЫ:</div>
            <div id="groups-list" class="scroll-area"></div>
            <button onclick="createGroup()" style="margin-top:5px; width:100%;">+ НОВАЯ ГРУППА</button>
        </div>

        <div class="column active-mob" id="col-main">
            <div id="profile-screen" style="display:flex; flex-direction:column; height:100%;">
                <div id="profile-card" class="card" style="display:flex; align-items:center; gap:15px; background: var(--bg-col);">
                    <img id="view-avatar" style="width:70px; height:70px; border:2px solid #fff; object-fit:cover;">
                    <div style="flex:1;">
                        <b id="view-nick" style="font-size:16px; color:var(--text-blue);"></b><br>
                        <small id="view-id-label"></small>
                        <div style="margin-top:8px;">
                            <button id="write-btn">СООБЩЕНИЕ</button>
                            <button id="follow-btn">ПОДПИСКА</button>
                            <button id="fav-btn">В ИЗБРАННОЕ</button>
                        </div>
                    </div>
                </div>

                <div id="wall-input-area" class="card">
                    <strong>НОВЫЙ ПОСТ (БЕЗ ЭМОДЗИ):</strong>
                    <textarea id="post-text" placeholder="Пишите здесь..."></textarea>
                    <button onclick="createPost()" style="width:100%; background: var(--text-blue); color:white;">ОПУБЛИКОВАТЬ</button>
                </div>

                <div id="wall-posts" class="scroll-area"></div>
            </div>

            <div id="chat-window" style="display:none; flex-direction:column; height:100%;">
                <div id="chat-header">
                    <button onclick="closeChat()" style="color:#000;">←</button>
                    <span id="chat-title">ЧАТ</span>
                    <button onclick="loadMessages()" style="color:#000;">↻</button>
                </div>
                <div id="messages-list" class="scroll-area"></div>
                <div class="card" style="display:flex; gap:5px; margin-top:5px;">
                    <input type="text" id="msg-input" placeholder="Только текст..." onkeyup="if(event.keyCode===13) sendMessage()">
                    <button onclick="sendMessage()" style="padding: 0 15px;">></button>
                </div>
            </div>
        </div>

        <div class="column" id="col-right">
            <strong>ПОИСК ПО ID:</strong>
            <div style="display:flex; gap:2px;"><input type="number" id="target-id-input"><button onclick="goToId()">НАЙТИ</button></div>
            <br>
            <strong>В СЕТИ:</strong>
            <div id="users-list" class="scroll-area"></div>
            <button onclick="showAbout()" style="width:100%; margin-top:10px;">НАСТРОЙКИ</button>
        </div>
    </div>

    <div class="mobile-nav" id="mob-nav">
        <button onclick="switchTab('col-left')">ЧАТЫ</button>
        <button onclick="loadFeed()">ЛЕНТА</button>
        <button onclick="switchTab('col-main'); showWall();">Я</button>
        <button onclick="switchTab('col-right')">ЛЮДИ</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xjekyaiyfvtjtkinlmbv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Nne-WFtskhN6oEkYkgtWhA_KHo2W8YC'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let myId, myNick, currentChatId;
        const DEFAULT_AVATAR = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRLCFpHxyg6G5c4uQQy6U5SlgJr6qq6P6ot7Q&s";

        // --- ФИЛЬТР ЭМОДЗИ (ЯДРО) ---
        function filterContent(text) {
            // Удаляет все символы из диапазона Emoji и Pictographs
            return text.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E6}-\u{1F1FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}\u{1F018}-\u{1F270}\u{238C}-\u{2454}\u{203C}\u{2049}\u{2122}\u{2139}\u{2194}-\u{2199}\u{21A9}-\u{21AA}\u{231A}-\u{231B}\u{23E9}-\u{23EC}\u{23F0}\u{23F3}\u{24C2}\u{25AA}-\u{25AB}\u{25B6}\u{25C0}\u{25FB}-\u{25FE}\u{2934}-\u{2935}\u{2B05}-\u{2B07}\u{2B1B}-\u{2B1C}\u{2B50}\u{2B55}\u{3030}\u{303D}\u{3297}\u{3299}]/gu, '');
        }

        async function handleAuth(mode) {
            const id = document.getElementById('my-id-input').value;
            const pass = document.getElementById('my-pass-input').value;
            const nick = filterContent(document.getElementById('my-nick-input').value);
            let av = document.getElementById('my-avatar-input').value.trim() || DEFAULT_AVATAR;

            if (mode === 'reg') {
                await _supabase.from('users').insert([{ id_number: id, password: pass, nickname: nick, avatar_url: av }]);
            }
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', id).eq('password', pass).single();
            
            if (user) {
                myId = id; myNick = user.nickname;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                document.getElementById('display-nick').innerText = myNick;
                document.getElementById('display-id').innerText = "ID: " + myId;
                document.getElementById('my-avatar-img').src = user.avatar_url;
                if(window.innerWidth <= 768) document.getElementById('mob-nav').style.display = 'flex';
                loadGroups(); loadUsers(); loadInbox(); viewProfile(myId); initRealtime();
            } else { alert("ОШИБКА АВТОРИЗАЦИИ"); }
        }

        // --- ФУНКЦИИ ЧАТА ---
        async function sendMessage() {
            const inp = document.getElementById('msg-input');
            const pureText = filterContent(inp.value.trim());
            if(!pureText || !currentChatId) return;

            await _supabase.from('messages').insert([{ 
                sender_id: myId, 
                chat_id: currentChatId, 
                text: pureText 
            }]);
            inp.value = "";
            loadMessages();
            loadInbox();
        }

        async function loadMessages() {
            if(!currentChatId) return;
            const { data } = await _supabase.from('messages').select('*').eq('chat_id', currentChatId).order('created_at', { ascending: true });
            const box = document.getElementById('messages-list');
            
            box.innerHTML = (data || []).map(m => `
                <div class="msg-line">
                    <div class="msg-author">ID ${m.sender_id} <span style="font-weight:normal; opacity:0.5;">${new Date(m.created_at).toLocaleTimeString()}</span></div>
                    <div class="msg-text">${filterContent(m.text)}</div>
                </div>
            `).join('');
            box.scrollTop = box.scrollHeight;
        }

        async function loadInbox() {
            // Загрузка списка последних диалогов
            const { data } = await _supabase.from('messages').select('*').order('created_at', { ascending: false }).limit(100);
            const list = document.getElementById('inbox-list');
            if(!data) return;

            const seen = new Set();
            const lastMsgs = [];
            data.forEach(m => {
                if((m.chat_id.includes(myId) || m.chat_id.startsWith("group_")) && !seen.has(m.chat_id)) {
                    seen.add(m.chat_id);
                    lastMsgs.push(m);
                }
            });

            list.innerHTML = lastMsgs.map(m => `
                <div class="card" style="margin-bottom:2px; cursor:pointer; font-size:10px;" onclick="openChatById('${m.chat_id}')">
                    <b>${m.chat_id.startsWith('group_') ? 'ГРУППА' : 'ЧАТ: '+m.chat_id.replace(myId,'').replace('_','')}</b><br>
                    <span style="opacity:0.7;">${filterContent(m.text).substring(0,20)}...</span>
                </div>
            `).join('');
        }

        // --- ПОСТЫ ---
        async function createPost() {
            const t = document.getElementById('post-text').value.trim();
            const pureText = filterContent(t);
            if(!pureText) return;
            await _supabase.from('posts').insert([{ author_id: myId, text: pureText, likes: 0, liked_by: [] }]);
            document.getElementById('post-text').value = "";
            viewProfile(myId);
        }

        function parseContent(str) {
            const pure = filterContent(str);
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            return pure.replace(urlPattern, (u) => {
                if(u.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    return `<img src="${u}" class="embedded-img" onclick="window.open('${u}')">`;
                }
                return `<a href="${u}" target="_blank" style="color:var(--text-blue);">${u}</a>`;
            });
        }

        // --- СИСТЕМНЫЕ ---
        function switchTab(id) {
            document.querySelectorAll('.column').forEach(c => c.classList.remove('active-mob'));
            document.getElementById(id).classList.add('active-mob');
        }

        function closeChat() {
            document.getElementById('chat-window').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            currentChatId = null;
        }

        async function openPrivate(id, nick) {
            currentChatId = [myId, id].sort().join("_");
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = nick;
            loadMessages();
        }

        async function openChatById(chatId) {
            if(chatId.startsWith("group_")) {
                const gid = chatId.replace("group_", "");
                startGroupChat(gid, "Группа #" + gid);
            } else {
                const tid = chatId.split('_').find(x => x != myId);
                openPrivate(tid, "ID " + tid);
            }
        }

        async function viewProfile(userId) {
            switchTab('col-main');
            closeChat();
            const { data: user } = await _supabase.from('users').select('*').eq('id_number', userId).single();
            if(!user) return;

            document.getElementById('view-avatar').src = user.avatar_url;
            document.getElementById('view-nick').innerText = user.nickname;
            document.getElementById('view-id-label').innerText = "ID: " + user.id_number;
            
            const isMe = (userId == myId);
            document.getElementById('wall-input-area').style.display = isMe ? 'block' : 'none';
            document.getElementById('write-btn').style.display = isMe ? 'none' : 'inline-block';
            document.getElementById('write-btn').onclick = () => openPrivate(user.id_number, user.nickname);
            
            loadPosts(userId);
        }

        async function loadPosts(userId) {
            const { data: posts } = await _supabase.from('posts').select('*').eq('author_id', userId).order('created_at', { ascending: false });
            const wall = document.getElementById('wall-posts');
            wall.innerHTML = (posts || []).map(p => `
                <div class="post">
                    <small style="opacity:0.5;">${new Date(p.created_at).toLocaleDateString()}</small>
                    <div style="margin:5px 0;">${parseContent(p.text)}</div>
                    <button onclick="toggleLike('${p.id}', '${userId}')" style="font-size:9px;">ЛАЙК (${p.likes || 0})</button>
                </div>
            `).join('');
        }

        function initRealtime() {
            _supabase.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                if (payload.new.chat_id === currentChatId) loadMessages();
                loadInbox();
            }).subscribe();
        }

        // Инициализация функций из твоего шаблона
        function showWall() { viewProfile(myId); }
        function goToId() { const i = document.getElementById('target-id-input').value; if(i) viewProfile(i); }
        async function loadUsers() {
            const { data } = await _supabase.from('users').select('*').limit(20);
            if(data) document.getElementById('users-list').innerHTML = data.map(u => `
                <div style="padding:5px; border-bottom:1px solid var(--border-ui); cursor:pointer;" onclick="viewProfile('${u.id_number}')">
                    <b>${u.nickname}</b> <small>(ID ${u.id_number})</small>
                </div>
            `).join('');
        }
        function showAbout() { alert("ЛАСТОЧКА v2.0\nEmoji: DISABLED\nEngine: Supabase Realtime"); }
        async function loadGroups() {
            const { data } = await _supabase.from('groups').select('*');
            if(data) document.getElementById('groups-list').innerHTML = data.map(g => `<div class="card" style="cursor:pointer; font-size:10px;" onclick="startGroupChat('${g.id}','${g.name}')"># ${g.name}</div>`).join('');
        }
        function startGroupChat(id, name) {
            currentChatId = "group_" + id;
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-title').innerText = name;
            loadMessages();
        }
    </script>
</body>
</html>
